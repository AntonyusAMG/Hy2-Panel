<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName nl2.xtinder.ru
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/nl2.xtinder.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/nl2.xtinder.ru/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:4000/
    ProxyPassReverse / http://127.0.0.1:4000/
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    # Явно передаём Authorization header в бэкенд (иначе Apache его удаляет)
    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
    RequestHeader set Authorization "%{HTTP_AUTHORIZATION}e" env=HTTP_AUTHORIZATION
</VirtualHost>
</IfModule>
